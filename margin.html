<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Margin</title>
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="">
        <div class="row justify-center">
            <div class="col">
                   <p class="bg-primary me-4">My name is Jerry</p> 
                   <img src="burna.png" class="img-fluid" alt="">
                   <img src="burna.png" class="rounded" width="100px" alt=""><br><br>
                   <img src="burna.png" class="rounded-circle" width="100px" alt="">
                   <img src="burna.png" class="img-thumbnails" width="100px" alt="">
                   <img src="burna.png" class="rounded-top" width="100px" alt="">
                   <img src="burna.png" class="rounded-bottom" width="100px" alt="">
                   <br><br>
                   <div>
                    <iframe width="560" height="315" src="https://www.youtube.com/embed/qcDZI4z1iWE?si=eTatuem-XH7MnjLc&amp;start=2" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe> 
                   </div>
                 
            </div>
        </div>
    </div>
     
</body>
</html>
